<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ارسال پست — BandW</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080808;--surface:#111;--surface2:#161616;--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.15);--text:#e8e8e8;--text-muted:#777;--text-dim:#444;--radius:14px;--radius-sm:8px;--ease:cubic-bezier(0.4,0,0.2,1);}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Vazirmatn','Inter',sans-serif;-webkit-font-smoothing:antialiased;}

.header{height:58px;display:flex;align-items:center;justify-content:center;background:rgba(6,6,15,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);}
.header-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.header-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#fff,#999);box-shadow:0 0 12px rgba(255,255,255,0.4);}
.header-name{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.14em;color:#fff;text-transform:uppercase;}

.wrap{max-width:600px;margin:0 auto;padding:32px 20px 80px;}

.back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 16px;margin-bottom:28px;cursor:pointer;font-size:0.72rem;color:var(--text-muted);text-decoration:none;transition:all 0.2s var(--ease);}
.back-btn:hover{background:var(--surface2);border-color:var(--border-hover);color:#fff;}
.back-btn .arrow{transition:transform 0.2s;}
.back-btn:hover .arrow{transform:translateX(-3px);}

.page-title{font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:6px;}
.page-sub{font-size:0.72rem;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:36px;}

.form-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:28px 24px;display:flex;flex-direction:column;gap:24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}

.field{display:flex;flex-direction:column;gap:10px;}
.field label{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);}
.field input,.field textarea,.field select{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;font-family:'Vazirmatn','Inter',sans-serif;font-size:0.9rem;
  color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(180,180,255,0.35);box-shadow:0 0 0 3px rgba(180,180,255,0.06);}
.field select{cursor:pointer;appearance:none;-webkit-appearance:none;}
.field select option{background:#161616;color:#e8e8e8;}
.field textarea{min-height:220px;resize:none;line-height:1.8;}

.submit-btn{
  background:#fff;color:#000;border:none;border-radius:var(--radius-sm);
  padding:14px;font-family:'Vazirmatn','Inter',sans-serif;font-size:0.85rem;font-weight:600;
  letter-spacing:0.06em;cursor:pointer;transition:opacity 0.2s,transform 0.2s;
  margin-top:4px;
}
.submit-btn:hover{opacity:0.9;transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}

.msg{padding:14px 16px;border-radius:var(--radius-sm);font-size:0.78rem;letter-spacing:0.04em;display:none;margin-top:4px;}
.msg.success{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:#e0e0e0;}
.msg.error{background:rgba(255,80,80,0.06);border:1px solid rgba(255,80,80,0.2);color:#ff9090;}

@media(max-width:520px){.wrap{padding:24px 14px 60px;}.form-card{padding:20px 16px;}.page-title{font-size:1.4rem;}}
</style>
</head>
<body>
<header class="header">
  <a href="index.html" class="header-logo">
    <span class="header-dot"></span>
    <span class="header-name">BandW</span>
  </a>
</header>
<div class="wrap">
  <a href="index.html" class="back-btn"><span class="arrow">←</span> بازگشت</a>
  <h1 class="page-title">ارسال پست</h1>
  <p class="page-sub">پست شما بعد از تایید ادمین منتشر می‌شود</p>

  <div class="form-card">
    <div class="field">
      <label>عنوان پست</label>
      <input type="text" id="title" placeholder="عنوان مقاله را بنویسید..." />
    </div>
    <div class="field">
      <label>دسته‌بندی</label>
      <select id="category"><option value="">در حال بارگذاری...</option></select>
    </div>
    <div class="field">
      <label>متن پست</label>
      <textarea id="body" placeholder="متن کامل مقاله را اینجا بنویسید..."></textarea>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitPost()">ارسال برای بررسی</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://hngeorydusjxqaceojmj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';
const H={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`};

async function loadCategories(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/categories?order=name.asc`,{headers:H});
    const cats=await r.json();
    const sel=document.getElementById('category');
    sel.innerHTML='<option value="">انتخاب کنید...</option>';
    cats.forEach(c=>{const o=document.createElement('option');o.value=c.name;o.textContent=c.name;sel.appendChild(o);});
  }catch{document.getElementById('category').innerHTML='<option value="">خطا در بارگذاری</option>';}
}

async function submitPost(){
  const title=document.getElementById('title').value.trim();
  const category=document.getElementById('category').value;
  const body=document.getElementById('body').value.trim();
  const msg=document.getElementById('msg');
  const btn=document.getElementById('submit-btn');
  if(!title||!category||!body){
    msg.className='msg error';msg.textContent='لطفاً همه فیلدها را پر کنید.';msg.style.display='block';return;
  }
  btn.disabled=true;btn.textContent='در حال ارسال...';msg.style.display='none';
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/posts`,{
      method:'POST',
      headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({title,category,body,status:'pending'})
    });
    if(res.ok){
      msg.className='msg success';msg.textContent='پست با موفقیت ارسال شد و منتظر تایید ادمین است.';msg.style.display='block';
      document.getElementById('title').value='';document.getElementById('category').value='';document.getElementById('body').value='';
      btn.textContent='ارسال شد ✓';
    }else throw new Error();
  }catch{
    msg.className='msg error';msg.textContent='خطا در ارسال. دوباره تلاش کنید.';msg.style.display='block';
    btn.disabled=false;btn.textContent='ارسال برای بررسی';
  }
}
loadCategories();
</script>
</body>
</html>
