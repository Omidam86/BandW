<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ارسال پست — BandW</title>
    <style>
        :root{--bg:#000;--text:#e0e0e0;--text-dim:#888;--line-divider:rgba(255,255,255,0.10);--line-active:rgba(255,255,255,0.25);--font-mono:'SF Mono','Cascadia Code','Consolas',monospace;--font-sans:'Inter','Segoe UI',system-ui,sans-serif;--rule-height:32px;--header-height:56px;}
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{min-height:100%;background:var(--bg);font-family:var(--font-mono);color:var(--text);-webkit-font-smoothing:antialiased;}
        .header{height:var(--header-height);display:flex;align-items:center;justify-content:center;background:#000;border-bottom:1px solid var(--line-divider);position:relative;}
        .header-title{font-family:var(--font-sans);font-size:1.35rem;font-weight:700;letter-spacing:0.08em;color:#fff;text-transform:uppercase;text-decoration:none;}
        .header-subtle{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:0.55rem;letter-spacing:0.1em;color:var(--text-dim);opacity:0.5;}
        .wrap{max-width:600px;margin:0 auto;padding:48px 28px 80px;}
        .back-row{display:flex;align-items:center;gap:8px;font-size:0.7rem;letter-spacing:0.06em;color:var(--text-dim);cursor:pointer;margin-bottom:calc(var(--rule-height)*1.2);transition:color 0.2s;text-decoration:none;}
        .back-row:hover{color:#fff;}
        h1{font-family:var(--font-sans);font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:0.04em;}
        .subtitle{font-size:0.7rem;letter-spacing:0.08em;color:var(--text-dim);opacity:0.6;margin-bottom:48px;}
        .field{margin-bottom:32px;}
        label{display:block;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;opacity:0.7;}
        input,textarea,select{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.2);padding:10px 0;font-family:var(--font-mono);font-size:0.95rem;color:var(--text);outline:none;transition:border-color 0.2s;}
        input:focus,textarea:focus,select:focus{border-bottom-color:rgba(255,255,255,0.6);}
        select{cursor:pointer;appearance:none;-webkit-appearance:none;}
        select option{background:#111;color:#e0e0e0;}
        textarea{min-height:240px;resize:none;line-height:var(--rule-height);}
        .hint{font-size:0.6rem;color:var(--text-dim);margin-top:8px;letter-spacing:0.04em;opacity:0.5;}
        .submit-btn{width:100%;margin-top:40px;background:#fff;color:#000;border:none;padding:16px;font-family:var(--font-mono);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;}
        .submit-btn:hover{opacity:0.85;}
        .submit-btn:disabled{opacity:0.3;cursor:not-allowed;}
        .message{margin-top:20px;padding:14px;font-size:0.7rem;letter-spacing:0.05em;text-align:center;border:1px solid rgba(255,255,255,0.2);display:none;}
        .message.error{border-color:rgba(255,80,80,0.5);color:#ff9090;}
        .message.success{border-color:rgba(255,255,255,0.3);color:#e0e0e0;}
        @media(max-width:520px){.wrap{padding:32px 16px 60px;} h1{font-size:1.4rem;}}
    </style>
</head>
<body>
<header class="header">
    <a href="index.html" class="header-title">BandW</a>
    <span class="header-subtle">ارسال پست</span>
</header>
<div class="wrap">
    <a href="index.html" class="back-row">← بازگشت به سایت</a>
    <h1>ارسال پست</h1>
    <p class="subtitle">پست شما بعد از تایید ادمین منتشر می‌شود</p>

    <div class="field">
        <label>عنوان پست</label>
        <input type="text" id="title" placeholder="عنوان مقاله را بنویسید..." />
    </div>

    <div class="field">
        <label>دسته‌بندی</label>
        <select id="category">
            <option value="">در حال بارگذاری...</option>
        </select>
    </div>

    <div class="field">
        <label>متن پست</label>
        <textarea id="body" placeholder="متن کامل مقاله را اینجا بنویسید..."></textarea>
        <p class="hint">هر پاراگراف را با Enter جدا کنید</p>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitPost()">ارسال برای بررسی</button>
    <div class="message" id="message"></div>
</div>
<script>
const SUPABASE_URL = 'https://hngeorydusjxqaceojmj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';
const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

async function loadCategories() {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/categories?order=name.asc`, { headers });
    const cats = await r.json();
    const sel = document.getElementById('category');
    sel.innerHTML = '<option value="">انتخاب کنید...</option>';
    cats.forEach(c => { const o = document.createElement('option'); o.value = c.name; o.textContent = c.name; sel.appendChild(o); });
}

async function submitPost() {
    const title = document.getElementById('title').value.trim();
    const category = document.getElementById('category').value;
    const body = document.getElementById('body').value.trim();
    const msg = document.getElementById('message');
    const btn = document.getElementById('submit-btn');

    if (!title || !category || !body) {
        msg.className = 'message error'; msg.textContent = 'لطفاً همه فیلدها را پر کنید.'; msg.style.display = 'block'; return;
    }
    btn.disabled = true; btn.textContent = 'در حال ارسال...'; msg.style.display = 'none';
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
            method: 'POST',
            headers: { ...headers, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
            body: JSON.stringify({ title, category, body, status: 'pending' })
        });
        if (res.ok) {
            msg.className = 'message success'; msg.textContent = 'پست شما با موفقیت ارسال شد و منتظر تایید ادمین است.'; msg.style.display = 'block';
            document.getElementById('title').value = ''; document.getElementById('category').value = ''; document.getElementById('body').value = '';
            btn.textContent = 'ارسال شد ✓';
        } else { throw new Error(); }
    } catch {
        msg.className = 'message error'; msg.textContent = 'خطا در ارسال. دوباره تلاش کنید.'; msg.style.display = 'block';
        btn.disabled = false; btn.textContent = 'ارسال برای بررسی';
    }
}
loadCategories();
</script>
</body>
</html>
