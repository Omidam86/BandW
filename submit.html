<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ارسال پست — BandW</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f5f5f0; --fg: #0a0a0a; --gray: #888; --border-color: #0a0a0a; --header-bg: #0a0a0a; --header-fg: #f5f5f0; --header-h: 56px; }
    html, body { min-height: 100%; background: var(--bg); color: var(--fg); font-family: 'Vazirmatn', sans-serif; font-weight: 300; }
    header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); background: var(--header-bg); color: var(--header-fg); display: flex; align-items: center; padding: 0 32px; z-index: 100; border-bottom: 2px solid var(--header-fg); }
    .site-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; color: var(--header-fg); text-decoration: none; }
    .page-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); margin-right: auto; letter-spacing: 2px; }
    .wrap { max-width: 680px; margin: 0 auto; padding: calc(var(--header-h) + 48px) 32px 80px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; margin-bottom: 8px; }
    .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); letter-spacing: 2px; margin-bottom: 48px; }
    .field { margin-bottom: 28px; }
    label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; }
    input, textarea, select { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--fg); padding: 10px 0; font-family: 'Vazirmatn', sans-serif; font-size: 15px; color: var(--fg); outline: none; transition: border-color 0.2s; resize: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--fg); border-bottom-width: 2px; }
    select option { background: var(--bg); color: var(--fg); }
    textarea { min-height: 280px; line-height: 1.8; }
    .hint { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--gray); margin-top: 6px; letter-spacing: 1px; }
    .submit-btn { margin-top: 40px; background: var(--fg); color: var(--bg); border: none; padding: 14px 40px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; width: 100%; }
    .submit-btn:hover { opacity: 0.8; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .message { margin-top: 24px; padding: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; text-align: center; }
    .message.success { border: 1px solid var(--fg); }
    .message.error { border: 1px solid #c00; color: #c00; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--gray); text-decoration: none; margin-bottom: 40px; border-bottom: 1px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .back-link:hover { color: var(--fg); border-color: var(--fg); }
    @media (max-width: 480px) { .wrap { padding: calc(var(--header-h) + 28px) 16px 60px; } h1 { font-size: 26px; } header { padding: 0 16px; } }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="site-name">BandW</a>
  <span class="page-label">— ارسال پست —</span>
</header>
<div class="wrap">
  <a href="index.html" class="back-link">← بازگشت به سایت</a>
  <h1>ارسال پست</h1>
  <p class="subtitle">پست شما بعد از تایید ادمین منتشر می‌شود</p>

  <div class="field">
    <label>عنوان پست</label>
    <input type="text" id="title" placeholder="عنوان مقاله را بنویسید..." />
  </div>

  <div class="field">
    <label>دسته‌بندی</label>
    <input type="text" id="category" placeholder="مثلاً: فلسفه، ادبیات، تکنولوژی..." />
  </div>

  <div class="field">
    <label>متن پست</label>
    <textarea id="body" placeholder="متن کامل مقاله را اینجا بنویسید...&#10;&#10;هر پاراگراف را با یک خط خالی جدا کنید."></textarea>
    <p class="hint">هر پاراگراف را با Enter جدا کنید</p>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitPost()">ارسال برای بررسی</button>
  <div class="message" id="message" style="display:none"></div>
</div>

<script>
  const SUPABASE_URL = 'https://hngeorydusjxqaceojmj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';

  async function submitPost() {
    const title = document.getElementById('title').value.trim();
    const category = document.getElementById('category').value.trim();
    const body = document.getElementById('body').value.trim();
    const msg = document.getElementById('message');
    const btn = document.getElementById('submit-btn');

    if (!title || !category || !body) {
      msg.className = 'message error';
      msg.textContent = 'لطفاً همه فیلدها را پر کنید.';
      msg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'در حال ارسال...';
    msg.style.display = 'none';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/posts`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({ title, category, body, status: 'pending' })
      });

      if (res.ok) {
        msg.className = 'message success';
        msg.textContent = 'پست شما با موفقیت ارسال شد و منتظر تایید ادمین است.';
        msg.style.display = 'block';
        document.getElementById('title').value = '';
        document.getElementById('category').value = '';
        document.getElementById('body').value = '';
        btn.textContent = 'ارسال شد ✓';
      } else {
        throw new Error('خطا در ارسال');
      }
    } catch (e) {
      msg.className = 'message error';
      msg.textContent = 'خطا در ارسال پست. لطفاً دوباره تلاش کنید.';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ارسال برای بررسی';
    }
  }
</script>
</body>
</html>
