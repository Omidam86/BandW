name: Auto Post Tech News

on:
  schedule:
    - cron: '0 7 * * *'   # ساعت ۷ صبح UTC (10:30 ایران)
    - cron: '0 14 * * *'  # ساعت 2 بعدازظهر UTC (5:30 عصر ایران)
  workflow_dispatch:        # اجرای دستی از GitHub

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Generate and publish post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node .github/scripts/generate-post.js
        
