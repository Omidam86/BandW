<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BandW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#080808;
  --surface:#111;
  --surface2:#161616;
  --border:rgba(255,255,255,0.07);
  --border-hover:rgba(255,255,255,0.15);
  --text:#e8e8e8;
  --text-muted:#777;
  --text-dim:#444;
  --accent:#fff;
  --header-h:58px;
  --footer-h:62px;
  --radius:14px;
  --radius-sm:8px;
  --ease:cubic-bezier(0.4,0,0.2,1);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Vazirmatn','Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100%;max-width:700px;margin:0 auto;}

/* ── HEADER ── */
.header{
  flex:0 0 var(--header-h);
  display:flex;align-items:center;justify-content:center;
  background:rgba(8,8,8,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  cursor:pointer;position:relative;z-index:50;
}
.header-logo{
  display:flex;align-items:center;gap:10px;
}
.header-dot{
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,#fff,#999);
  box-shadow:0 0 12px rgba(255,255,255,0.4);
  transition:transform 0.3s var(--ease),box-shadow 0.3s;
}
.header:hover .header-dot{transform:scale(1.3);box-shadow:0 0 20px rgba(255,255,255,0.7);}
.header-name{font-family:'Inter',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:0.14em;color:#fff;text-transform:uppercase;}
.header-tag{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:0.48rem;letter-spacing:0.16em;color:var(--text-dim);text-transform:uppercase;}

/* ── CONTENT ── */
.content{
  flex:1 1 auto;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:20px 16px;
  scroll-behavior:smooth;
}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

/* ── SECTION LABEL ── */
.section-label{
  font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:14px;padding:0 4px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── POST CARD ── */
.post-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 20px;
  margin-bottom:10px;
  cursor:pointer;
  transition:background 0.25s var(--ease),border-color 0.25s var(--ease),transform 0.2s var(--ease),box-shadow 0.25s var(--ease);
  position:relative;overflow:hidden;
}
.post-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 60%);
  opacity:0;transition:opacity 0.3s;
}
.post-card:hover{
  background:var(--surface2);border-color:var(--border-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.post-card:hover::before{opacity:1;}
.post-card:active{transform:translateY(0);transition-duration:0.1s;}

.post-card.best{border-color:rgba(255,255,255,0.18);}
.post-card.best::after{
  content:'';position:absolute;top:0;right:0;
  width:3px;height:100%;
  background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,0.2) 100%);
  border-radius:0 var(--radius) var(--radius) 0;
}

.card-row{display:flex;align-items:flex-start;gap:14px;}
.card-bullet{
  flex:0 0 6px;width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.25);margin-top:9px;
  transition:background 0.2s,transform 0.2s,box-shadow 0.2s;
  flex-shrink:0;
}
.post-card:hover .card-bullet{background:rgba(255,255,255,0.8);transform:scale(1.4);box-shadow:0 0 8px rgba(255,255,255,0.5);}
.post-card.best .card-bullet{background:#fff;box-shadow:0 0 10px rgba(255,255,255,0.5);}

.card-body{flex:1;min-width:0;}
.card-title{
  font-size:0.95rem;font-weight:500;color:#e0e0e0;line-height:1.5;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color 0.2s;margin-bottom:6px;
}
.post-card:hover .card-title{color:#fff;}
.card-meta{display:flex;align-items:center;gap:8px;}
.card-cat{
  font-size:0.58rem;letter-spacing:0.08em;color:var(--text-muted);
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:20px;padding:2px 9px;
}
.card-arrow{margin-right:auto;font-size:0.75rem;color:var(--text-dim);transition:transform 0.2s,color 0.2s;}
.post-card:hover .card-arrow{transform:translateX(-4px);color:var(--text-muted);}

/* ── CATEGORY CARD ── */
.cat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 20px;margin-bottom:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:background 0.25s var(--ease),border-color 0.25s var(--ease),transform 0.2s var(--ease),box-shadow 0.25s var(--ease);
}
.cat-card:hover{background:var(--surface2);border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.cat-card:active{transform:translateY(0);}
.cat-name{font-size:0.95rem;font-weight:500;color:#ddd;transition:color 0.2s;}
.cat-card:hover .cat-name{color:#fff;}
.cat-arrow{font-size:0.8rem;color:var(--text-dim);transition:transform 0.2s,color 0.2s;}
.cat-card:hover .cat-arrow{transform:translateX(-4px);color:var(--text-muted);}

/* ── BACK BUTTON ── */
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 16px;margin-bottom:16px;cursor:pointer;
  font-size:0.72rem;letter-spacing:0.04em;color:var(--text-muted);
  transition:all 0.2s var(--ease);
}
.back-btn:hover{background:var(--surface2);border-color:var(--border-hover);color:#fff;}
.back-btn .arrow{transition:transform 0.2s;}
.back-btn:hover .arrow{transform:translateX(-3px);}

/* ── ARTICLE ── */
.article-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px 22px;
  animation:slideUp 0.3s var(--ease);
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.article-title{
  font-family:'Vazirmatn',sans-serif;font-size:1.5rem;font-weight:700;
  color:#fff;line-height:1.4;margin-bottom:20px;
  padding-bottom:16px;border-bottom:1px solid var(--border);
}
.article-body{font-size:0.9rem;line-height:1.9;color:#bbb;font-weight:300;}
.article-body p{margin-bottom:16px;}
.article-body p:last-child{margin-bottom:0;}
.article-footer{
  margin-top:24px;padding-top:16px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.article-cat{font-size:0.58rem;letter-spacing:0.08em;color:var(--text-muted);background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:2px 9px;}
.article-date{font-size:0.58rem;letter-spacing:0.06em;color:var(--text-dim);}

/* ── STATUS ── */
.status-card{
  background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);
  padding:48px 24px;text-align:center;color:var(--text-dim);font-size:0.8rem;letter-spacing:0.06em;
}
.loading-card{animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.6;}}

/* ── FOOTER ── */
.footer{
  flex:0 0 var(--footer-h);
  display:flex;align-items:stretch;
  background:rgba(8,8,8,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  z-index:50;
}
.footer-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;background:none;border:none;cursor:pointer;
  color:var(--text-dim);font-family:'Vazirmatn','Inter',sans-serif;
  font-size:0.65rem;letter-spacing:0.04em;
  transition:color 0.2s var(--ease),background 0.2s;
  position:relative;outline:none;-webkit-tap-highlight-color:transparent;
}
.footer-btn:hover{color:var(--text-muted);background:rgba(255,255,255,0.02);}
.footer-btn.active{color:#fff;}
.footer-btn-icon{font-size:1.1rem;line-height:1;transition:transform 0.2s var(--ease);}
.footer-btn:hover .footer-btn-icon{transform:translateY(-2px);}
.footer-btn.active::after{
  content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:20px;height:2px;background:#fff;border-radius:2px;
}
.footer-sep{width:1px;background:var(--border);margin:14px 0;flex:0 0 1px;}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  :root{--header-h:52px;--footer-h:58px;--radius:12px;}
  .content{padding:16px 12px;}
  .post-card{padding:16px;}
  .article-title{font-size:1.3rem;}
  .article-card{padding:20px 16px;}
}
@media(max-width:380px){
  :root{--header-h:48px;--footer-h:54px;}
  .content{padding:12px 10px;}
  .card-title{font-size:0.88rem;}
  .footer-btn{font-size:0.58rem;}
}
</style>
</head>
<body>
<div class="app">
  <header class="header" id="header">
    <div class="header-logo">
      <span class="header-dot"></span>
      <span class="header-name">BandW</span>
    </div>
    <span class="header-tag">black &amp; white</span>
  </header>

  <main class="content" id="content"></main>

  <footer class="footer">
    <button class="footer-btn active" data-tab="home" id="btn-home">
      <span class="footer-btn-icon">⌂</span>خانه
    </button>
    <span class="footer-sep"></span>
    <button class="footer-btn" data-tab="category" id="btn-category">
      <span class="footer-btn-icon">◈</span>دسته‌ها
    </button>
    <span class="footer-sep"></span>
    <button class="footer-btn" data-tab="best" id="btn-best">
      <span class="footer-btn-icon">★</span>منتخب
    </button>
    <span class="footer-sep"></span>
    <button class="footer-btn" data-tab="submit" id="btn-submit">
      <span class="footer-btn-icon">✎</span>ارسال
    </button>
  </footer>
</div>

<script>
(function(){
const SUPABASE_URL='https://hngeorydusjxqaceojmj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';
const H={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`};

const state={tab:'home',view:'list',posts:[],categories:[],selectedCat:null,selectedPost:null};
const contentEl=document.getElementById('content');

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function fetchJSON(url){
  const r=await fetch(url,{headers:H});
  if(!r.ok)throw new Error(r.status);
  return r.json();
}

async function getPosts(f={}){
  let url=`${SUPABASE_URL}/rest/v1/posts?status=eq.published&order=created_at.desc`;
  if(f.category)url+=`&category=eq.${encodeURIComponent(f.category)}`;
  if(f.best)url+=`&is_best=eq.true`;
  return fetchJSON(url);
}

function clear(){contentEl.innerHTML='';contentEl.scrollTop=0;}

function showLoading(){
  clear();
  const d=document.createElement('div');
  d.className='status-card loading-card';
  d.textContent='در حال بارگذاری...';
  contentEl.appendChild(d);
}

function sectionLabel(text){
  const d=document.createElement('div');
  d.className='section-label';
  d.textContent=text;
  return d;
}

function backBtn(text,onClick){
  const d=document.createElement('div');
  d.className='back-btn';
  d.innerHTML=`<span class="arrow">←</span>${text}`;
  d.addEventListener('click',onClick);
  return d;
}

function renderList(){
  clear();
  contentEl.appendChild(sectionLabel(state.tab==='home'?'آخرین مطالب':'منتخب سردبیر'));
  if(!state.posts.length){
    const d=document.createElement('div');d.className='status-card';d.textContent='مطلبی یافت نشد';contentEl.appendChild(d);return;
  }
  state.posts.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='post-card'+(p.is_best?' best':'');
    card.style.animationDelay=`${i*40}ms`;
    card.style.animation=`slideUp 0.3s cubic-bezier(0.4,0,0.2,1) both`;
    card.innerHTML=`
      <div class="card-row">
        <span class="card-bullet"></span>
        <div class="card-body">
          <div class="card-title">${esc(p.title)}</div>
          <div class="card-meta">
            <span class="card-cat">${esc(p.category)}</span>
            <span class="card-arrow">←</span>
          </div>
        </div>
      </div>`;
    card.addEventListener('click',()=>{state.selectedPost=p;state.view='article';render();});
    contentEl.appendChild(card);
  });
}

function renderCategories(){
  clear();
  contentEl.appendChild(sectionLabel('دسته‌بندی‌ها'));
  if(!state.categories.length){
    const d=document.createElement('div');d.className='status-card';d.textContent='دسته‌بندی یافت نشد';contentEl.appendChild(d);return;
  }
  state.categories.forEach((cat,i)=>{
    const card=document.createElement('div');
    card.className='cat-card';
    card.style.animation=`slideUp 0.3s cubic-bezier(0.4,0,0.2,1) ${i*40}ms both`;
    card.innerHTML=`<span class="cat-name">${esc(cat.name)}</span><span class="cat-arrow">←</span>`;
    card.addEventListener('click',async()=>{
      state.selectedCat=cat.name;state.view='catposts';
      showLoading();
      try{state.posts=await getPosts({category:cat.name});}catch{state.posts=[];}
      render();
    });
    contentEl.appendChild(card);
  });
}

function renderCatPosts(){
  clear();
  contentEl.appendChild(backBtn('بازگشت به دسته‌ها',()=>{state.view='categories';state.selectedCat=null;render();}));
  contentEl.appendChild(sectionLabel(state.selectedCat));
  if(!state.posts.length){
    const d=document.createElement('div');d.className='status-card';d.textContent='مطلبی در این دسته یافت نشد';contentEl.appendChild(d);return;
  }
  state.posts.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='post-card'+(p.is_best?' best':'');
    card.style.animation=`slideUp 0.3s cubic-bezier(0.4,0,0.2,1) ${i*40}ms both`;
    card.innerHTML=`<div class="card-row"><span class="card-bullet"></span><div class="card-body"><div class="card-title">${esc(p.title)}</div></div><span class="card-arrow">←</span></div>`;
    card.addEventListener('click',()=>{state.selectedPost=p;state.view='article';render();});
    contentEl.appendChild(card);
  });
}

function renderArticle(){
  clear();
  const p=state.selectedPost;
  if(!p){state.view='list';render();return;}
  contentEl.appendChild(backBtn('بازگشت',()=>{
    state.view=state.selectedCat&&state.tab==='category'?'catposts':'list';
    state.selectedPost=null;render();
  }));
  const date=new Date(p.created_at).toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'});
  const body=(p.body||'').split('\n').filter(l=>l.trim()).map(l=>`<p>${esc(l)}</p>`).join('');
  const card=document.createElement('div');
  card.className='article-card';
  card.innerHTML=`
    <div class="article-title">${esc(p.title)}</div>
    <div class="article-body">${body||'<p>بدون محتوا</p>'}</div>
    <div class="article-footer">
      <span class="article-cat">${esc(p.category)}</span>
      <span class="article-date">${date}</span>
    </div>`;
  contentEl.appendChild(card);
}

function render(){
  if(state.view==='categories')renderCategories();
  else if(state.view==='catposts')renderCatPosts();
  else if(state.view==='article')renderArticle();
  else renderList();
}

async function loadAndRender(f={}){
  showLoading();
  try{state.posts=await getPosts(f);}catch{state.posts=[];}
  render();
}

function setTab(tab){
  if(tab==='submit'){window.location.href='submit.html';return;}
  document.querySelectorAll('.footer-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+tab)?.classList.add('active');
  state.tab=tab;state.selectedCat=null;state.selectedPost=null;
  if(tab==='category'){state.view='categories';state.posts=[];render();}
  else if(tab==='best'){state.view='list';loadAndRender({best:true});}
  else{state.view='list';loadAndRender();}
}

document.getElementById('header').addEventListener('click',()=>setTab('home'));
document.querySelectorAll('.footer-btn').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));

(async function init(){
  try{state.categories=await fetchJSON(`${SUPABASE_URL}/rest/v1/categories?order=name.asc`);}catch{state.categories=[];}
  try{state.posts=await getPosts();}catch{state.posts=[];}
  render();
})();
})();
</script>
</body>
</html>
