<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BandW</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080808;--surface:#111;--surface2:#161616;
  --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.15);
  --text:#e8e8e8;--text-muted:#777;--text-dim:#444;
  --radius:14px;--radius-sm:8px;--ease:cubic-bezier(0.4,0,0.2,1);
  --header-h:58px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Vazirmatn','Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}

.app{display:flex;flex-direction:column;height:100%;max-width:700px;margin:0 auto;}

/* ── HEADER ── */
.header{
  flex:0 0 var(--header-h);display:flex;align-items:center;padding:0 18px;
  background:rgba(8,8,8,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);position:relative;z-index:50;
  gap:12px;
}
.menu-btn{
  width:36px;height:36px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;color:var(--text-muted);
  transition:all 0.2s var(--ease);flex-shrink:0;
}
.menu-btn:hover{background:var(--surface2);border-color:var(--border-hover);color:#fff;}
.header-center{flex:1;display:flex;flex-direction:column;align-items:center;}
.header-name{font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.14em;color:#fff;text-transform:uppercase;}
.header-tag{font-size:0.46rem;letter-spacing:0.16em;color:var(--text-dim);text-transform:uppercase;margin-top:1px;}
.header-right{width:36px;} /* spacer for symmetry */

/* ── CONTENT ── */
.content{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:20px 16px;scroll-behavior:smooth;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

/* ── SECTION LABEL ── */
.section-label{font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;padding:0 4px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── POST CARD ── */
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:background 0.25s var(--ease),border-color 0.25s var(--ease),transform 0.2s var(--ease),box-shadow 0.25s var(--ease);position:relative;overflow:hidden;}
.post-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03) 0%,transparent 60%);opacity:0;transition:opacity 0.3s;}
.post-card:hover{background:var(--surface2);border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.post-card:hover::before{opacity:1;}
.post-card:active{transform:translateY(0);transition-duration:0.1s;}
.post-card.best{border-color:rgba(255,255,255,0.18);}
.post-card.best::after{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,0.2) 100%);border-radius:0 var(--radius) var(--radius) 0;}
.card-row{display:flex;align-items:flex-start;gap:14px;}
.card-bullet{flex:0 0 6px;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);margin-top:9px;transition:background 0.2s,transform 0.2s,box-shadow 0.2s;flex-shrink:0;}
.post-card:hover .card-bullet{background:rgba(255,255,255,0.8);transform:scale(1.4);box-shadow:0 0 8px rgba(255,255,255,0.5);}
.post-card.best .card-bullet{background:#fff;box-shadow:0 0 10px rgba(255,255,255,0.5);}
.card-body{flex:1;min-width:0;}
.card-title{font-size:0.95rem;font-weight:500;color:#e0e0e0;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s;margin-bottom:6px;}
.post-card:hover .card-title{color:#fff;}
.card-meta{display:flex;align-items:center;gap:8px;}
.card-cat{font-size:0.58rem;letter-spacing:0.08em;color:var(--text-muted);background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:2px 9px;}
.card-arrow{margin-right:auto;font-size:0.75rem;color:var(--text-dim);transition:transform 0.2s,color 0.2s;}
.post-card:hover .card-arrow{transform:translateX(-4px);color:var(--text-muted);}

/* ── CAT CARD ── */
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.25s var(--ease),border-color 0.25s var(--ease),transform 0.2s var(--ease),box-shadow 0.25s var(--ease);}
.cat-card:hover{background:var(--surface2);border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.cat-card:active{transform:translateY(0);}
.cat-name{font-size:0.95rem;font-weight:500;color:#ddd;transition:color 0.2s;}
.cat-card:hover .cat-name{color:#fff;}
.cat-arrow{font-size:0.8rem;color:var(--text-dim);transition:transform 0.2s,color 0.2s;}
.cat-card:hover .cat-arrow{transform:translateX(-4px);color:var(--text-muted);}

/* ── BACK BTN ── */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 16px;margin-bottom:16px;cursor:pointer;font-size:0.72rem;color:var(--text-muted);transition:all 0.2s var(--ease);}
.back-btn:hover{background:var(--surface2);border-color:var(--border-hover);color:#fff;}
.back-btn .arr{transition:transform 0.2s;}
.back-btn:hover .arr{transform:translateX(-3px);}

/* ── ARTICLE ── */
.article-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 22px;animation:slideUp 0.3s var(--ease);}
.article-title{font-size:1.5rem;font-weight:700;color:#fff;line-height:1.4;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.article-body{font-size:0.9rem;line-height:1.9;color:#bbb;font-weight:300;}
.article-body p{margin-bottom:16px;}
.article-body p:last-child{margin-bottom:0;}
.article-footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.article-cat{font-size:0.58rem;letter-spacing:0.08em;color:var(--text-muted);background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:2px 9px;}
.article-date{font-size:0.58rem;color:var(--text-dim);}

/* ── STATUS ── */
.status-card{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;color:var(--text-dim);font-size:0.8rem;letter-spacing:0.06em;}
.loading-card{animation:pulse 1.6s ease-in-out infinite;}

/* ── BOTTOM SHEET OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background 0.35s var(--ease);}
.overlay.open{background:rgba(0,0,0,0.7);pointer-events:all;}

/* ── BOTTOM SHEET ── */
.sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:700px;
  background:#0f0f0f;
  border-top:1px solid rgba(255,255,255,0.1);
  border-radius:24px 24px 0 0;
  z-index:201;
  transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.sheet.open{transform:translateX(-50%) translateY(0);}

.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:14px auto 0;}

.sheet-header{padding:20px 24px 8px;display:flex;align-items:center;gap:10px;}
.sheet-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#fff,#999);box-shadow:0 0 10px rgba(255,255,255,0.4);}
.sheet-title{font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.12em;color:#fff;text-transform:uppercase;}

.sheet-divider{height:1px;background:var(--border);margin:8px 16px;}

.sheet-menu{padding:8px 12px 20px;}
.menu-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 14px;border-radius:var(--radius-sm);
  cursor:pointer;transition:background 0.2s var(--ease);
  position:relative;
}
.menu-item:hover{background:rgba(255,255,255,0.04);}
.menu-item:active{background:rgba(255,255,255,0.07);}
.menu-item.active .menu-icon{color:#fff;}
.menu-item.active .menu-label{color:#fff;font-weight:500;}
.menu-item.active::before{content:'';position:absolute;right:14px;width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,0.6);}
.menu-icon{font-size:1.1rem;color:var(--text-muted);width:24px;text-align:center;transition:color 0.2s;}
.menu-label{font-size:0.9rem;color:var(--text-muted);transition:color 0.2s;flex:1;}
.menu-item:hover .menu-icon,.menu-item:hover .menu-label{color:#e0e0e0;}

.sheet-sep{height:1px;background:var(--border);margin:8px 16px;}


/* ── AD SLOT ── */
.ad-slot{
  margin: 12px 0 4px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  min-height: 100px;
}

/* ── ANIMATIONS ── */
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.6;}}

/* ── RESPONSIVE ── */
@media(max-width:520px){:root{--header-h:52px;--radius:12px;}.content{padding:16px 12px;}.post-card{padding:16px;}.article-card{padding:20px 16px;}.article-title{font-size:1.3rem;}}
@media(max-width:380px){:root{--header-h:48px;}.content{padding:12px 10px;}.card-title{font-size:0.88rem;}}

/* --- BandW Loading Screen Styles --- */
#app-loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--bg); /* استفاده از رنگ پس‌زمینه پروژه شما #080808 */
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999999; /* قرارگیری در بالاترین لایه ممکن */
  transition: opacity 0.4s var(--ease), visibility 0.4s var(--ease);
}

.loading-text-wrapper {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  direction: ltr; /* برای اینکه لودینگ از چپ به راست B and W چیده شود */
}

.loading-text-wrapper .letter {
  opacity: 0;
  transform: translateY(12px);
  filter: blur(5px);
  animation: introLetter 0.5s var(--ease) forwards;
}

#l-b {
  font-size: 3rem;
  font-weight: 700;
  color: var(--text); /* رنگ سفید اصلی #e8e8e8 */
  animation-delay: 0.2s;
}

#l-and {
  font-size: 1.8rem;
  font-weight: 300;
  color: var(--text-muted); /* رنگ خاکستری دیم‌شده #777 */
  animation-delay: 0.6s;
}

#l-w {
  font-size: 3rem;
  font-weight: 700;
  color: var(--text); /* رنگ سفید اصلی #e8e8e8 */
  animation-delay: 1s;
}

/* انیمیشن ظاهر شدن حروف با افکت مات و حرکت ظریف */
@keyframes introLetter {
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

/* کلاس محو شدن کل صفحه پس از اتمام انیمیشن */
#app-loading-screen.loaded {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

<script>
(function(){
const SUPABASE_URL='https://hngeorydusjxqaceojmj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';
const H={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`};

const state={tab:'home',view:'list',posts:[],categories:[],selectedCat:null,selectedPost:null};
const contentEl=document.getElementById('content');

// Sheet
let sheetOpen=false;
function toggleSheet(){sheetOpen?closeSheet():openSheet();}
function openSheet(){sheetOpen=true;document.getElementById('sheet').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeSheet(){sheetOpen=false;document.getElementById('sheet').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
window.toggleSheet=toggleSheet;window.closeSheet=closeSheet;

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
async function fetchJSON(url){const r=await fetch(url,{headers:H});if(!r.ok)throw new Error(r.status);return r.json();}
async function getPosts(f={}){
  let url=`${SUPABASE_URL}/rest/v1/posts?status=eq.published&order=created_at.desc`;
  if(f.category)url+=`&category=eq.${encodeURIComponent(f.category)}`;
  if(f.best)url+=`&is_best=eq.true`;
  if(f.popular)url+=`&order=view_count.desc`;
  return fetchJSON(url);
}

function clear(){contentEl.innerHTML='';contentEl.scrollTop=0;}
function showLoading(){clear();const d=document.createElement('div');d.className='status-card loading-card';d.textContent='در حال بارگذاری...';contentEl.appendChild(d);}

function sectionLabel(text){const d=document.createElement('div');d.className='section-label';d.textContent=text;return d;}

function backBtn(text,onClick){
  const d=document.createElement('div');d.className='back-btn';
  d.innerHTML=`<span class="arr">←</span>${text}`;
  d.addEventListener('click',onClick);return d;
}

function renderList(label){
  clear();contentEl.appendChild(sectionLabel(label||'آخرین مطالب'));
  if(!state.posts.length){const d=document.createElement('div');d.className='status-card';d.textContent='مطلبی یافت نشد';contentEl.appendChild(d);return;}
  state.posts.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='post-card'+(p.is_best?' best':'');
    card.style.animation=`slideUp 0.3s cubic-bezier(0.4,0,0.2,1) ${i*40}ms both`;
    card.innerHTML=`<div class="card-row"><span class="card-bullet"></span><div class="card-body"><div class="card-title">${esc(p.title)}</div><div class="card-meta"><span class="card-cat">${esc(p.category)}</span><span class="card-arrow">←</span></div></div></div>`;
    card.addEventListener('click',()=>{state.selectedPost=p;state.view='article';render();});
    contentEl.appendChild(card);
  });
  // Ad slot
  const adSlot=document.createElement('div');
  adSlot.className='ad-slot';
  adSlot.setAttribute('data-yn-zone','46846');
  contentEl.appendChild(adSlot);
  if(window.yektanet)window.yektanet('refreshAds');
}

function renderCategories(){
  clear();contentEl.appendChild(sectionLabel('دسته‌بندی‌ها'));
  if(!state.categories.length){const d=document.createElement('div');d.className='status-card';d.textContent='دسته‌بندی یافت نشد';contentEl.appendChild(d);return;}
  state.categories.forEach((cat,i)=>{
    const card=document.createElement('div');card.className='cat-card';
    card.style.animation=`slideUp 0.3s cubic-bezier(0.4,0,0.2,1) ${i*40}ms both`;
    card.innerHTML=`<span class="cat-name">${esc(cat.name)}</span><span class="cat-arrow">←</span>`;
    card.addEventListener('click',async()=>{
      state.selectedCat=cat.name;state.view='catposts';showLoading();
      try{state.posts=await getPosts({category:cat.name});}catch{state.posts=[];}
      render();
    });
    contentEl.appendChild(card);
  });
}

function renderCatPosts(){
  clear();
  contentEl.appendChild(backBtn('بازگشت به دسته‌ها',()=>{state.view='categories';state.selectedCat=null;render();}));
  contentEl.appendChild(sectionLabel(state.selectedCat));
  if(!state.posts.length){const d=document.createElement('div');d.className='status-card';d.textContent='مطلبی در این دسته یافت نشد';contentEl.appendChild(d);return;}
  state.posts.forEach((p,i)=>{
    const card=document.createElement('div');card.className='post-card'+(p.is_best?' best':'');
    card.style.animation=`slideUp 0.3s cubic-bezier(0.4,0,0.2,1) ${i*40}ms both`;
    card.innerHTML=`<div class="card-row"><span class="card-bullet"></span><div class="card-body"><div class="card-title">${esc(p.title)}</div></div><span class="card-arrow">←</span></div>`;
    card.addEventListener('click',()=>{state.selectedPost=p;state.view='article';render();});
    contentEl.appendChild(card);
  });
}

function renderArticle(){
  clear();const p=state.selectedPost;
  if(!p){state.view='list';render();return;}
  contentEl.appendChild(backBtn('بازگشت',()=>{
    state.view=state.selectedCat&&state.tab==='category'?'catposts':'list';
    state.selectedPost=null;render();
  }));
  const date=new Date(p.created_at).toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'});
  const body=(p.body||'').split('\n').filter(l=>l.trim()).map(l=>`<p>${esc(l)}</p>`).join('');
  const card=document.createElement('div');card.className='article-card';
  card.innerHTML=`<div class="article-title">${esc(p.title)}</div><div class="article-body">${body||'<p>بدون محتوا</p>'}</div><div class="article-footer"><span class="article-cat">${esc(p.category)}</span><span class="article-date">${date}</span></div>`;
  contentEl.appendChild(card);
}

const tabLabels={home:'آخرین مطالب',best:'منتخب سردبیر',popular:'پر بازدید'};

function render(){
  if(state.view==='categories')renderCategories();
  else if(state.view==='catposts')renderCatPosts();
  else if(state.view==='article')renderArticle();
  else renderList(tabLabels[state.tab]);
}

async function loadAndRender(f={}){
  showLoading();
  try{state.posts=await getPosts(f);}catch{state.posts=[];}
  render();
}

window.setTab=function(tab){
  if(tab==='submit'){window.location.href='submit.html';return;}
  closeSheet();
  document.querySelectorAll('.menu-item').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  state.tab=tab;state.selectedCat=null;state.selectedPost=null;
  if(tab==='category'){state.view='categories';state.posts=[];render();}
  else if(tab==='best'){state.view='list';loadAndRender({best:true});}
  else if(tab==='popular'){state.view='list';loadAndRender({popular:true});}
  else{state.view='list';loadAndRender();}
};

(async function init(){
  try{state.categories=await fetchJSON(`${SUPABASE_URL}/rest/v1/categories?order=name.asc`);}catch{state.categories=[];}
  try{state.posts=await getPosts();}catch{state.posts=[];}
  render();
})();
})();

// --- BandW Loading Screen Controller ---
document.addEventListener("DOMContentLoaded", () => {
  // تایمر ۲ ثانیه‌ای برای کامل شدن انیمیشن متوالی حروف
  setTimeout(() => {
    const loaderScreen = document.getElementById("app-loading-screen");
    if (loaderScreen) {
      loaderScreen.classList.add("loaded");
      
      // حذف کامل از DOM بعد از پایان انیمیشن CSS جهت بالا بردن پرفورمنس صفحه
      setTimeout(() => {
        loaderScreen.remove();
      }, 400);
    }
  }, 1900);
});

</script>
