<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandW</title>
    <style>
        :root {
            --bg: #000000;
            --text: #e0e0e0;
            --text-dim: #888888;
            --text-sm: #777777;
            --line-rule: rgba(255,255,255,0.045);
            --line-divider: rgba(255,255,255,0.10);
            --line-active: rgba(255,255,255,0.25);
            --font-mono: 'SF Mono','Cascadia Code','Consolas','Courier New',monospace;
            --font-sans: 'Inter','Segoe UI','Helvetica Neue',system-ui,sans-serif;
            --rule-height: 32px;
            --header-height: 56px;
            --footer-height: 60px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);font-family:var(--font-mono);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        .app{display:flex;flex-direction:column;height:100%;width:100%;max-width:720px;margin:0 auto;position:relative;}
        .header{flex:0 0 var(--header-height);height:var(--header-height);display:flex;align-items:center;justify-content:center;background:#000;border-bottom:1px solid var(--line-divider);cursor:pointer;position:relative;z-index:10;}
        .header-title{font-family:var(--font-sans);font-size:1.35rem;font-weight:700;letter-spacing:0.08em;color:#fff;transition:opacity 0.2s;text-transform:uppercase;}
        .header:hover .header-title{opacity:0.7;}
        .header-subtle{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:0.55rem;letter-spacing:0.1em;color:var(--text-dim);font-family:var(--font-mono);opacity:0.5;}
        .content{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background-color:#000;background-image:repeating-linear-gradient(0deg,transparent,transparent calc(var(--rule-height) - 1px),var(--line-rule) calc(var(--rule-height) - 1px),var(--line-rule) var(--rule-height));padding:20px 28px 28px;scroll-behavior:smooth;}
        .content::-webkit-scrollbar{width:4px;}
        .content::-webkit-scrollbar-track{background:transparent;}
        .content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
        .list-item{display:flex;align-items:center;min-height:calc(var(--rule-height)*2);padding:calc(var(--rule-height)*0.35) 0;border-bottom:1px solid var(--line-divider);cursor:pointer;transition:background 0.15s;gap:12px;}
        .list-item:hover{background:rgba(255,255,255,0.015);}
        .list-item:last-child{border-bottom:none;}
        .list-item-bullet{flex:0 0 7px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.30);transition:background 0.2s;}
        .list-item:hover .list-item-bullet{background:rgba(255,255,255,0.7);}
        .list-item-best .list-item-bullet{background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.4);}
        .list-item-title{font-size:1rem;line-height:var(--rule-height);color:#e0e0e0;letter-spacing:0.02em;transition:color 0.2s;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .list-item:hover .list-item-title{color:#fff;}
        .list-item-cat-tag{font-size:0.65rem;color:var(--text-sm);letter-spacing:0.04em;flex:0 0 auto;opacity:0.6;transition:opacity 0.2s;}
        .list-item:hover .list-item-cat-tag{opacity:1;}
        .category-card{display:flex;align-items:center;justify-content:space-between;min-height:calc(var(--rule-height)*2);padding:calc(var(--rule-height)*0.35) 0;border-bottom:1px solid var(--line-divider);cursor:pointer;transition:background 0.15s;}
        .category-card:hover{background:rgba(255,255,255,0.015);}
        .category-card:last-child{border-bottom:none;}
        .category-card-name{font-size:1rem;letter-spacing:0.03em;color:#e0e0e0;transition:color 0.2s;}
        .category-card:hover .category-card-name{color:#fff;}
        .category-card-count{font-size:0.7rem;color:var(--text-sm);letter-spacing:0.05em;opacity:0.6;}
        .article-view{animation:fadeIn 0.25s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        .article-title{font-family:var(--font-sans);font-size:1.6rem;font-weight:700;line-height:calc(var(--rule-height)*2);color:#fff;letter-spacing:0.03em;margin-bottom:calc(var(--rule-height)*0.8);padding-bottom:calc(var(--rule-height)*0.5);border-bottom:2px solid var(--line-active);}
        .article-body{font-size:0.95rem;line-height:var(--rule-height);color:#c8c8c8;letter-spacing:0.02em;margin-bottom:calc(var(--rule-height)*1.2);}
        .article-body p{margin-bottom:var(--rule-height);}
        .article-category{display:inline-block;font-size:0.6rem;letter-spacing:0.07em;color:var(--text-sm);text-transform:uppercase;opacity:0.5;border-top:1px solid var(--line-divider);padding-top:calc(var(--rule-height)*0.5);margin-top:calc(var(--rule-height)*0.3);}
        .section-label{font-size:0.6rem;letter-spacing:0.1em;color:var(--text-dim);text-transform:uppercase;margin-bottom:calc(var(--rule-height)*0.6);padding-bottom:4px;border-bottom:1px solid var(--line-divider);opacity:0.6;}
        .back-row{display:flex;align-items:center;gap:8px;font-size:0.7rem;letter-spacing:0.06em;color:var(--text-dim);cursor:pointer;margin-bottom:calc(var(--rule-height)*0.8);transition:color 0.2s;padding:4px 0;}
        .back-row:hover{color:#fff;}
        .empty-state{text-align:center;padding:calc(var(--rule-height)*3) 0;color:var(--text-dim);font-size:0.85rem;letter-spacing:0.04em;opacity:0.5;}
        .loading-state{text-align:center;padding:calc(var(--rule-height)*3) 0;color:var(--text-dim);font-size:0.75rem;letter-spacing:0.08em;opacity:0.4;}
        .footer{flex:0 0 var(--footer-height);height:var(--footer-height);display:flex;align-items:stretch;background:#000;border-top:1px solid var(--line-divider);position:relative;z-index:10;}
        .footer-btn{flex:1;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:0.75rem;letter-spacing:0.06em;color:#999;background:transparent;border:none;cursor:pointer;transition:color 0.2s,background 0.15s;position:relative;text-transform:lowercase;-webkit-tap-highlight-color:transparent;outline:none;}
        .footer-btn:hover{color:#ccc;background:rgba(255,255,255,0.015);}
        .footer-btn.active{color:#fff;}
        .footer-btn.active::after{content:'';position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:18px;height:2px;background:#fff;border-radius:1px;}
        .footer-divider{width:1px;background:var(--line-divider);flex:0 0 1px;}
        @media(max-width:520px){.content{padding:14px 16px 20px;}.article-title{font-size:1.3rem;}.list-item-title{font-size:0.9rem;}.header-title{font-size:1.15rem;}.footer-btn{font-size:0.7rem;}}
        @media(max-width:380px){.content{padding:10px 10px 16px;}.article-title{font-size:1.15rem;}.list-item-title{font-size:0.8rem;}.footer-btn{font-size:0.65rem;}}
    </style>
</head>
<body>
<div class="app">
    <header class="header" id="header">
        <span class="header-title">BandW</span>
        <span class="header-subtle">black &amp; white</span>
    </header>
    <main class="content" id="content"></main>
    <footer class="footer">
        <button class="footer-btn active" data-tab="home" id="btn-home">home</button>
        <span class="footer-divider"></span>
        <button class="footer-btn" data-tab="category" id="btn-category">category</button>
        <span class="footer-divider"></span>
        <button class="footer-btn" data-tab="best" id="btn-best">best</button>
        <span class="footer-divider"></span>
        <button class="footer-btn" data-tab="submit" id="btn-submit">submit</button>
    </footer>
</div>
<script>
const SUPABASE_URL = 'https://hngeorydusjxqaceojmj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';

const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

async function getPosts(filter = {}) {
    let url = `${SUPABASE_URL}/rest/v1/posts?status=eq.published&order=created_at.desc`;
    if (filter.category) url += `&category=eq.${encodeURIComponent(filter.category)}`;
    if (filter.best) url += `&is_best=eq.true`;
    const r = await fetch(url, { headers });
    return r.json();
}

const contentEl = document.getElementById('content');
let state = { tab: 'home', view: 'list', selectedCategory: null, posts: [], categories: [] };

async function init() {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/categories?order=name.asc`, { headers });
    state.categories = await r.json();
    state.posts = await getPosts();
    render();
}

function setTab(tab) {
    if (tab === 'submit') { location.href = 'submit.html'; return; }
    document.querySelectorAll('.footer-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + tab).classList.add('active');
    state.tab = tab;
    state.view = tab === 'category' ? 'categories' : 'list';
    state.selectedCategory = null;
    if (tab !== 'home') state.posts = [];
    render();
    if (tab === 'best') loadAndRender({ best: true });
    if (tab === 'home') loadAndRender();
}

async function loadAndRender(filter = {}) {
    contentEl.innerHTML = `<div class="loading-state">loading...</div>`;
    state.posts = await getPosts(filter);
    render();
}

function render() {
    contentEl.innerHTML = '';
    contentEl.scrollTop = 0;
    if (state.view === 'categories') renderCategories();
    else if (state.view === 'catposts') renderCatPosts();
    else if (state.view === 'article') renderArticle();
    else renderList();
}

function renderList() {
    const label = state.tab === 'home' ? 'آخرین مطالب منتشر شده' : 'منتخب سردبیر';
    contentEl.innerHTML = `<div class="section-label">${label}</div>`;
    if (!state.posts.length) { contentEl.innerHTML += `<div class="empty-state">مطلبی یافت نشد</div>`; return; }
    state.posts.forEach(p => {
        const d = document.createElement('div');
        d.className = 'list-item' + (p.is_best ? ' list-item-best' : '');
        d.innerHTML = `<span class="list-item-bullet"></span><span class="list-item-title">${p.title}</span><span class="list-item-cat-tag">${p.category}</span>`;
        d.addEventListener('click', () => { state.selectedArticle = p; state.view = 'article'; render(); });
        contentEl.appendChild(d);
    });
}

function renderCategories() {
    contentEl.innerHTML = `<div class="section-label">دسته‌بندی‌ها</div>`;
    state.categories.forEach(cat => {
        const count = 0;
        const d = document.createElement('div');
        d.className = 'category-card';
        d.innerHTML = `<span class="category-card-name">${cat.name}</span>`;
        d.addEventListener('click', async () => {
            state.selectedCategory = cat.name;
            state.view = 'catposts';
            contentEl.innerHTML = `<div class="loading-state">loading...</div>`;
            state.posts = await getPosts({ category: cat.name });
            render();
        });
        contentEl.appendChild(d);
    });
}

function renderCatPosts() {
    const back = document.createElement('div');
    back.className = 'back-row';
    back.innerHTML = `<span>←</span> بازگشت به دسته‌بندی‌ها`;
    back.addEventListener('click', () => { state.view = 'categories'; render(); });
    contentEl.appendChild(back);
    contentEl.insertAdjacentHTML('afterbegin', `<div class="section-label">دسته: ${state.selectedCategory}</div>`);
    if (!state.posts.length) { contentEl.innerHTML += `<div class="empty-state">مطلبی یافت نشد</div>`; return; }
    state.posts.forEach(p => {
        const d = document.createElement('div');
        d.className = 'list-item' + (p.is_best ? ' list-item-best' : '');
        d.innerHTML = `<span class="list-item-bullet"></span><span class="list-item-title">${p.title}</span>`;
        d.addEventListener('click', () => { state.selectedArticle = p; state.view = 'article'; render(); });
        contentEl.appendChild(d);
    });
}

function renderArticle() {
    const p = state.selectedArticle;
    const date = new Date(p.created_at).toLocaleDateString('fa-IR');
    const back = document.createElement('div');
    back.className = 'back-row';
    back.innerHTML = `<span>←</span> بازگشت`;
    back.addEventListener('click', () => {
        if (state.selectedCategory) state.view = 'catposts';
        else state.view = 'list';
        render();
    });
    contentEl.appendChild(back);
    const body = p.body.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('');
    contentEl.insertAdjacentHTML('beforeend', `
        <div class="article-view">
            <div class="article-title">${p.title}</div>
            <div class="article-body">${body}</div>
            <div class="article-category">${p.category} · ${date}</div>
        </div>`);
}

document.getElementById('header').addEventListener('click', () => setTab('home'));
document.querySelectorAll('.footer-btn').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));

init();
</script>
</body>
</html>
