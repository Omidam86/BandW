<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandW</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #0d0d0d;
            --text: #d4d4d4;
            --text-bright: #f0f0f0;
            --text-dim: #7a7a7a;
            --text-faint: #555;
            --line-rule: rgba(255, 255, 255, 0.035);
            --line-divider: rgba(255, 255, 255, 0.08);
            --line-active: rgba(255, 255, 255, 0.22);
            --line-hairline: rgba(255, 255, 255, 0.05);
            --accent: #ffffff;
            --accent-dim: rgba(255, 255, 255, 0.55);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'JetBrains Mono', 'Courier New', monospace;
            --font-sans: 'Inter', 'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            --rule-height: 30px;
            --header-height: 52px;
            --footer-height: 56px;
            --content-padding-x: 32px;
            --content-padding-y: 24px;
            --transition-fast: 0.18s ease;
            --transition-smooth: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--font-mono);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            letter-spacing: 0.01em;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            position: relative;
            border-left: 1px solid var(--line-hairline);
            border-right: 1px solid var(--line-hairline);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.6);
        }

        /* ── header ─────────────────────── */
        .header {
            flex: 0 0 var(--header-height);
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border-bottom: 1px solid var(--line-divider);
            cursor: pointer;
            position: relative;
            z-index: 10;
            gap: 8px;
            transition: background var(--transition-fast);
        }
        .header:hover {
            background: #111;
        }
        .header-mark {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
            flex-shrink: 0;
            transition: opacity var(--transition-fast);
        }
        .header:hover .header-mark {
            opacity: 0.55;
        }
        .header-title {
            font-family: var(--font-sans);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #fff;
            transition: opacity var(--transition-fast);
            text-transform: uppercase;
            line-height: 1;
        }
        .header:hover .header-title {
            opacity: 0.65;
        }
        .header-subtle {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.52rem;
            letter-spacing: 0.13em;
            color: var(--text-faint);
            font-family: var(--font-mono);
            opacity: 0.45;
            transition: opacity var(--transition-fast);
        }
        .header:hover .header-subtle {
            opacity: 0.7;
        }

        /* ── content ────────────────────── */
        .content {
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            background-color: var(--bg);
            background-image:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent calc(var(--rule-height) - 1px),
                    var(--line-rule) calc(var(--rule-height) - 1px),
                    var(--line-rule) var(--rule-height));
            padding: var(--content-padding-y) var(--content-padding-x) calc(var(--content-padding-y) + 16px);
            scroll-behavior: smooth;
            position: relative;
        }
        .content::before {
            content: '';
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--line-hairline);
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .content.scrolled::before {
            opacity: 1;
        }
        .content::-webkit-scrollbar {
            width: 3px;
        }
        .content::-webkit-scrollbar-track {
            background: transparent;
        }
        .content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
        }
        .content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        /* ── section label ─────────────── */
        .section-label {
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            color: var(--text-faint);
            text-transform: uppercase;
            margin-bottom: calc(var(--rule-height) * 0.55);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line-divider);
            opacity: 0.7;
            font-family: var(--font-mono);
            transition: opacity var(--transition-fast);
        }

        /* ── list item ─────────────────── */
        .list-item {
            display: flex;
            align-items: center;
            min-height: calc(var(--rule-height) * 2);
            padding: calc(var(--rule-height) * 0.32) 0;
            border-bottom: 1px solid var(--line-hairline);
            cursor: pointer;
            transition: background var(--transition-fast), padding var(--transition-fast);
            gap: 14px;
            position: relative;
        }
        .list-item:hover {
            background: rgba(255, 255, 255, 0.012);
            padding-right: 6px;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item-bullet {
            flex: 0 0 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.22);
            transition: all var(--transition-smooth);
            flex-shrink: 0;
        }
        .list-item:hover .list-item-bullet {
            background: rgba(255, 255, 255, 0.65);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.25);
            transform: scale(1.3);
        }
        .list-item-best .list-item-bullet {
            background: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.35);
        }
        .list-item-best:hover .list-item-bullet {
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.55);
            transform: scale(1.4);
        }
        .list-item-title {
            font-size: 0.95rem;
            line-height: var(--rule-height);
            color: #c8c8c8;
            letter-spacing: 0.02em;
            transition: color var(--transition-fast);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: var(--font-sans);
            font-weight: 450;
        }
        .list-item:hover .list-item-title {
            color: #fff;
        }
        .list-item-best .list-item-title {
            font-weight: 550;
            color: #e8e8e8;
        }
        .list-item-cat-tag {
            font-size: 0.6rem;
            color: var(--text-faint);
            letter-spacing: 0.06em;
            flex: 0 0 auto;
            opacity: 0.5;
            transition: opacity var(--transition-fast);
            font-family: var(--font-mono);
            text-transform: lowercase;
        }
        .list-item:hover .list-item-cat-tag {
            opacity: 0.8;
        }

        /* ── category card ─────────────── */
        .category-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: calc(var(--rule-height) * 2);
            padding: calc(var(--rule-height) * 0.32) 0;
            border-bottom: 1px solid var(--line-hairline);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }
        .category-card:hover {
            background: rgba(255, 255, 255, 0.012);
            padding-right: 8px;
        }
        .category-card:last-child {
            border-bottom: none;
        }
        .category-card-name {
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            color: #c0c0c0;
            transition: color var(--transition-fast);
            font-family: var(--font-sans);
            font-weight: 450;
        }
        .category-card:hover .category-card-name {
            color: #fff;
        }
        .category-card-arrow {
            font-size: 0.7rem;
            color: var(--text-faint);
            opacity: 0;
            transition: all var(--transition-smooth);
            transform: translateX(-8px);
            letter-spacing: 0;
        }
        .category-card:hover .category-card-arrow {
            opacity: 0.7;
            transform: translateX(-2px);
        }
        .category-card-count {
            font-size: 0.6rem;
            color: var(--text-faint);
            letter-spacing: 0.06em;
            opacity: 0.45;
            font-family: var(--font-mono);
        }

        /* ── article view ──────────────── */
        .article-view {
            animation: fadeArticleIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeArticleIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .article-title {
            font-family: var(--font-sans);
            font-size: 1.55rem;
            font-weight: 700;
            line-height: calc(var(--rule-height) * 1.8);
            color: #fff;
            letter-spacing: 0.03em;
            margin-bottom: calc(var(--rule-height) * 0.7);
            padding-bottom: calc(var(--rule-height) * 0.45);
            border-bottom: 2px solid var(--line-active);
            word-break: break-word;
        }
        .article-body {
            font-size: 0.9rem;
            line-height: var(--rule-height);
            color: #bfbfbf;
            letter-spacing: 0.02em;
            margin-bottom: calc(var(--rule-height) * 1.1);
            font-family: var(--font-sans);
            font-weight: 400;
        }
        .article-body p {
            margin-bottom: calc(var(--rule-height) * 0.55);
            text-align: justify;
        }
        .article-body p:last-child {
            margin-bottom: 0;
        }
        .article-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.58rem;
            letter-spacing: 0.08em;
            color: var(--text-faint);
            text-transform: uppercase;
            opacity: 0.55;
            border-top: 1px solid var(--line-divider);
            padding-top: calc(var(--rule-height) * 0.45);
            margin-top: calc(var(--rule-height) * 0.25);
            font-family: var(--font-mono);
            flex-wrap: wrap;
        }
        .article-meta-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-faint);
            flex-shrink: 0;
            opacity: 0.5;
        }

        /* ── back row ──────────────────── */
        .back-row {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 0.68rem;
            letter-spacing: 0.07em;
            color: var(--text-dim);
            cursor: pointer;
            margin-bottom: calc(var(--rule-height) * 0.7);
            transition: all var(--transition-fast);
            padding: 5px 0;
            font-family: var(--font-mono);
            position: relative;
        }
        .back-row::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 0;
            width: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
            transition: width var(--transition-smooth);
        }
        .back-row:hover {
            color: #fff;
        }
        .back-row:hover::after {
            width: 100%;
        }
        .back-arrow {
            display: inline-block;
            transition: transform var(--transition-smooth);
            font-size: 0.75rem;
        }
        .back-row:hover .back-arrow {
            transform: translateX(-3px);
        }

        /* ── states ────────────────────── */
        .empty-state {
            text-align: center;
            padding: calc(var(--rule-height) * 3.5) 0;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            opacity: 0.4;
            font-family: var(--font-sans);
            font-weight: 400;
        }
        .empty-state::before {
            content: '—';
            display: block;
            font-size: 1.4rem;
            margin-bottom: calc(var(--rule-height) * 0.6);
            opacity: 0.35;
            letter-spacing: 0;
        }
        .loading-state {
            text-align: center;
            padding: calc(var(--rule-height) * 3.5) 0;
            color: var(--text-dim);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            opacity: 0.35;
            animation: pulseLoad 1.6s ease-in-out infinite;
            font-family: var(--font-mono);
        }
        @keyframes pulseLoad {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.55;
            }
        }

        /* ── footer ────────────────────── */
        .footer {
            flex: 0 0 var(--footer-height);
            height: var(--footer-height);
            display: flex;
            align-items: stretch;
            background: var(--surface);
            border-top: 1px solid var(--line-divider);
            position: relative;
            z-index: 10;
        }
        .footer-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.07em;
            color: #888;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            text-transform: lowercase;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            gap: 5px;
        }
        .footer-btn:hover {
            color: #bbb;
            background: rgba(255, 255, 255, 0.01);
        }
        .footer-btn.active {
            color: #fff;
            font-weight: 500;
        }
        .footer-btn.active::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #fff;
            opacity: 0.7;
        }
        .footer-btn.active::after {
            content: '';
            position: absolute;
            bottom: 9px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 1.5px;
            background: #fff;
            border-radius: 1px;
        }
        .footer-divider {
            width: 1px;
            background: var(--line-hairline);
            flex: 0 0 1px;
            margin: 12px 0;
        }

        /* ── responsive ────────────────── */
        @media (max-width: 560px) {
            :root {
                --content-padding-x: 18px;
                --content-padding-y: 16px;
                --rule-height: 28px;
                --header-height: 46px;
                --footer-height: 50px;
            }
            .app {
                border-left: none;
                border-right: none;
                max-width: 100%;
            }
            .article-title {
                font-size: 1.3rem;
            }
            .article-body {
                font-size: 0.84rem;
            }
            .list-item-title {
                font-size: 0.87rem;
            }
            .category-card-name {
                font-size: 0.87rem;
            }
            .header-title {
                font-size: 1.05rem;
            }
            .footer-btn {
                font-size: 0.65rem;
                letter-spacing: 0.05em;
            }
            .section-label {
                font-size: 0.54rem;
            }
        }
        @media (max-width: 380px) {
            :root {
                --content-padding-x: 12px;
                --content-padding-y: 12px;
                --rule-height: 26px;
                --header-height: 42px;
                --footer-height: 46px;
            }
            .article-title {
                font-size: 1.15rem;
            }
            .list-item-title {
                font-size: 0.8rem;
            }
            .category-card-name {
                font-size: 0.8rem;
            }
            .footer-btn {
                font-size: 0.6rem;
            }
            .list-item {
                gap: 10px;
            }
            .article-body {
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header" id="header" title="بازگشت به خانه">
            <span class="header-mark"></span>
            <span class="header-title">BandW</span>
            <span class="header-subtle">black &amp; white</span>
        </header>
        <main class="content" id="content"></main>
        <footer class="footer">
            <button class="footer-btn active" data-tab="home" id="btn-home">خانه</button>
            <span class="footer-divider"></span>
            <button class="footer-btn" data-tab="category" id="btn-category">دسته‌ها</button>
            <span class="footer-divider"></span>
            <button class="footer-btn" data-tab="best" id="btn-best">منتخب</button>
            <span class="footer-divider"></span>
            <button class="footer-btn" data-tab="submit" id="btn-submit">ارسال</button>
        </footer>
    </div>
    <script>
        const SUPABASE_URL = 'https://hngeorydusjxqaceojmj.supabase.co';
        const SUPABASE_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';

        const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

        async function getPosts(filter = {}) {
            let url = `${SUPABASE_URL}/rest/v1/posts?status=eq.published&order=created_at.desc`;
            if (filter.category) url += `&category=eq.${encodeURIComponent(filter.category)}`;
            if (filter.best) url += `&is_best=eq.true`;
            const r = await fetch(url, { headers });
            if (!r.ok) throw new Error('Network response was not ok');
            return r.json();
        }

        const contentEl = document.getElementById('content');
        let state = { tab: 'home', view: 'list', selectedCategory: null, posts: [], categories: [],
            selectedArticle: null };

        async function init() {
            try {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/categories?order=name.asc`, { headers });
                if (!r.ok) throw new Error('Failed to fetch categories');
                state.categories = await r.json();
            } catch (e) {
                state.categories = [];
                console.warn('Could not load categories:', e);
            }
            try {
                state.posts = await getPosts();
            } catch (e) {
                state.posts = [];
                console.warn('Could not load posts:', e);
            }
            render();
            setupScrollDetection();
        }

        function setupScrollDetection() {
            contentEl.addEventListener('scroll', () => {
                if (contentEl.scrollTop > 4) {
                    contentEl.classList.add('scrolled');
                } else {
                    contentEl.classList.remove('scrolled');
                }
            }, { passive: true });
        }

        function setTab(tab) {
            if (tab === 'submit') {
                window.location.href = 'submit.html';
                return;
            }
            document.querySelectorAll('.footer-btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById('btn-' + tab);
            if (targetBtn) targetBtn.classList.add('active');
            state.tab = tab;
            state.view = tab === 'category' ? 'categories' : 'list';
            state.selectedCategory = null;
            state.selectedArticle = null;
            if (tab !== 'home' && tab !== 'best') state.posts = [];
            render();
            if (tab === 'best') loadAndRender({ best: true });
            if (tab === 'home') loadAndRender();
        }

        async function loadAndRender(filter = {}) {
            contentEl.innerHTML = `<div class="loading-state">در حال بارگذاری...</div>`;
            try {
                state.posts = await getPosts(filter);
            } catch (e) {
                state.posts = [];
                contentEl.innerHTML = `<div class="empty-state">خطا در بارگذاری</div>`;
                return;
            }
            render();
        }

        function render() {
            contentEl.innerHTML = '';
            contentEl.scrollTop = 0;
            contentEl.classList.remove('scrolled');
            if (state.view === 'categories') renderCategories();
            else if (state.view === 'catposts') renderCatPosts();
            else if (state.view === 'article') renderArticle();
            else renderList();
        }

        function renderList() {
            const label = state.tab === 'home' ? 'آخرین مطالب منتشر شده' : 'منتخب سردبیر';
            const section = document.createElement('div');
            section.className = 'section-label';
            section.textContent = label;
            contentEl.appendChild(section);

            if (!state.posts || !state.posts.length) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'مطلبی یافت نشد';
                contentEl.appendChild(empty);
                return;
            }
            state.posts.forEach(p => {
                const d = document.createElement('div');
                d.className = 'list-item' + (p.is_best ? ' list-item-best' : '');
                d.innerHTML =
                    `<span class="list-item-bullet"></span><span class="list-item-title">${escapeHTML(p.title)}</span><span class="list-item-cat-tag">${escapeHTML(p.category || '')}</span>`;
                d.addEventListener('click', () => {
                    state.selectedArticle = p;
                    state.view = 'article';
                    render();
                });
                contentEl.appendChild(d);
            });
        }

        function renderCategories() {
            const section = document.createElement('div');
            section.className = 'section-label';
            section.textContent = 'دسته‌بندی‌ها';
            contentEl.appendChild(section);

            if (!state.categories || !state.categories.length) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'دسته‌بندی‌ای یافت نشد';
                contentEl.appendChild(empty);
                return;
            }
            state.categories.forEach(cat => {
                const d = document.createElement('div');
                d.className = 'category-card';
                d.innerHTML =
                    `<span class="category-card-name">${escapeHTML(cat.name)}</span><span class="category-card-arrow">←</span>`;
                d.addEventListener('click', async () => {
                    state.selectedCategory = cat.name;
                    state.view = 'catposts';
                    contentEl.innerHTML = `<div class="loading-state">در حال بارگذاری...</div>`;
                    try {
                        state.posts = await getPosts({ category: cat.name });
                    } catch (e) {
                        state.posts = [];
                    }
                    render();
                });
                contentEl.appendChild(d);
            });
        }

        function renderCatPosts() {
            const back = document.createElement('div');
            back.className = 'back-row';
            back.innerHTML = `<span class="back-arrow">←</span> بازگشت به دسته‌بندی‌ها`;
            back.addEventListener('click', () => {
                state.view = 'categories';
                state.selectedCategory = null;
                state.posts = [];
                render();
            });
            contentEl.appendChild(back);

            const section = document.createElement('div');
            section.className = 'section-label';
            section.textContent = 'دسته: ' + (state.selectedCategory || '');
            contentEl.appendChild(section);

            if (!state.posts || !state.posts.length) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = 'مطلبی در این دسته یافت نشد';
                contentEl.appendChild(empty);
                return;
            }
            state.posts.forEach(p => {
                const d = document.createElement('div');
                d.className = 'list-item' + (p.is_best ? ' list-item-best' : '');
                d.innerHTML =
                    `<span class="list-item-bullet"></span><span class="list-item-title">${escapeHTML(p.title)}</span>`;
                d.addEventListener('click', () => {
                    state.selectedArticle = p;
                    state.view = 'article';
                    render();
                });
                contentEl.appendChild(d);
            });
        }

        function renderArticle() {
            const p = state.selectedArticle;
            if (!p) {
                state.view = 'list';
                render();
                return;
            }
            const date = new Date(p.created_at).toLocaleDateString('fa-IR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            const back = document.createElement('div');
            back.className = 'back-row';
            back.innerHTML = `<span class="back-arrow">←</span> بازگشت`;
            back.addEventListener('click', () => {
                if (state.selectedCategory && state.tab === 'category') {
                    state.view = 'catposts';
                } else {
                    state.view = 'list';
                    state.selectedCategory = null;
                }
                state.selectedArticle = null;
                render();
            });
            contentEl.appendChild(back);

            const bodyHtml = (p.body || '')
                .split('\n')
                .filter(l => l.trim())
                .map(l => `<p>${escapeHTML(l)}</p>`)
                .join('');

            const article = document.createElement('div');
            article.className = 'article-view';
            article.innerHTML = `
            <div class="article-title">${escapeHTML(p.title)}</div>
            <div class="article-body">${bodyHtml || '<p>بدون محتوا</p>'}</div>
            <div class="article-meta">
              <span>${escapeHTML(p.category || 'بدون دسته')}</span>
              <span class="article-meta-dot"></span>
              <span>${date}</span>
            </div>`;
            contentEl.appendChild(article);
        }

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.getElementById('header').addEventListener('click', () => setTab('home'));
        document.querySelectorAll('.footer-btn').forEach(b => {
            b.addEventListener('click', () => setTab(b.dataset.tab));
        });

        init();
    </script>
</body>
</html>
