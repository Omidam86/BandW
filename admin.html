<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت — BandW</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080808;--surface:#111;--surface2:#161616;--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.15);--text:#e8e8e8;--text-muted:#777;--text-dim:#444;--radius:14px;--radius-sm:8px;--ease:cubic-bezier(0.4,0,0.2,1);--header-h:58px;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Vazirmatn','Inter',sans-serif;-webkit-font-smoothing:antialiased;}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;}
.login-box{width:100%;max-width:340px;}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.login-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#fff,#999);box-shadow:0 0 16px rgba(255,255,255,0.4);}
.login-title{font-family:'Inter',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:0.12em;color:#fff;text-transform:uppercase;}
.login-sub{font-size:0.6rem;letter-spacing:0.12em;color:var(--text-dim);margin-bottom:40px;padding-right:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;display:flex;flex-direction:column;gap:16px;}
.login-label{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);}
.login-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:'Vazirmatn','Inter',sans-serif;font-size:1rem;color:#fff;outline:none;transition:border-color 0.2s;}
.login-input:focus{border-color:rgba(255,255,255,0.3);}
.login-btn{background:#fff;color:#000;border:none;border-radius:var(--radius-sm);padding:13px;font-family:'Vazirmatn','Inter',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
.login-btn:hover{opacity:0.9;}
.login-error{font-size:0.72rem;color:#ff9090;text-align:center;display:none;}

/* ADMIN */
.admin-screen{display:none;}
.header{height:var(--header-h);display:flex;align-items:center;padding:0 20px;background:rgba(8,8,8,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);gap:10px;}
.header-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.header-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#fff,#999);box-shadow:0 0 10px rgba(255,255,255,0.4);}
.header-name{font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;letter-spacing:0.12em;color:#fff;text-transform:uppercase;}
.admin-badge{font-size:0.52rem;letter-spacing:0.1em;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#ccc;padding:3px 8px;border-radius:20px;}
.logout-btn{margin-right:auto;background:none;border:1px solid var(--border);color:var(--text-muted);font-family:'Vazirmatn','Inter',sans-serif;font-size:0.65rem;letter-spacing:0.06em;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--border-hover);color:#fff;}

.tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(8,8,8,0.9);position:sticky;top:var(--header-h);z-index:99;backdrop-filter:blur(20px);}
.tab-btn{flex:1;padding:14px 8px;font-family:'Vazirmatn','Inter',sans-serif;font-size:0.65rem;letter-spacing:0.06em;background:none;border:none;color:var(--text-dim);cursor:pointer;transition:color 0.2s,background 0.2s;position:relative;}
.tab-btn:hover{color:var(--text-muted);background:rgba(255,255,255,0.02);}
.tab-btn.active{color:#fff;}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#fff;border-radius:2px;}
.tab-count{font-size:0.55rem;opacity:0.5;margin-right:4px;}

.tab-panel{display:none;padding:20px 16px;}
.tab-panel.active{display:block;}

/* POST CARDS */
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px;animation:slideUp 0.3s var(--ease) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.post-title{font-size:1rem;font-weight:500;color:#e0e0e0;margin-bottom:6px;line-height:1.4;}
.post-meta{font-size:0.6rem;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:10px;}
.post-preview{font-size:0.78rem;line-height:1.6;color:var(--text-muted);margin-bottom:16px;max-height:60px;overflow:hidden;position:relative;}
.post-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,var(--surface));}
.post-actions{display:flex;gap:8px;flex-wrap:wrap;}
.action-btn{font-family:'Vazirmatn','Inter',sans-serif;font-size:0.62rem;letter-spacing:0.04em;padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
.action-btn:hover{border-color:var(--border-hover);color:#fff;background:var(--surface2);}
.action-btn.publish{border-color:rgba(100,255,130,0.2);color:#80ff99;}
.action-btn.publish:hover{border-color:rgba(100,255,130,0.5);background:rgba(100,255,130,0.06);}
.action-btn.danger{border-color:rgba(255,80,80,0.2);color:#ff9090;}
.action-btn.danger:hover{border-color:rgba(255,80,80,0.4);background:rgba(255,80,80,0.06);}
.action-btn.star-on{border-color:rgba(255,255,100,0.3);color:#ffff80;}

/* CATEGORY TAB */
.add-cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;display:flex;gap:10px;align-items:center;}
.cat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-family:'Vazirmatn','Inter',sans-serif;font-size:0.88rem;color:#fff;outline:none;transition:border-color 0.2s;}
.cat-input:focus{border-color:rgba(255,255,255,0.3);}
.cat-add-btn{background:#fff;color:#000;border:none;border-radius:var(--radius-sm);padding:10px 18px;font-family:'Vazirmatn','Inter',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
.cat-add-btn:hover{opacity:0.85;}
.cat-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;animation:slideUp 0.25s var(--ease) both;}
.cat-row-name{font-size:0.88rem;color:#ddd;}

.status-card{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:48px;text-align:center;color:var(--text-dim);font-size:0.8rem;letter-spacing:0.06em;}
.loading-card{animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:0.6;}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;color:#000;font-size:0.75rem;letter-spacing:0.06em;padding:12px 24px;border-radius:var(--radius-sm);z-index:999;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;white-space:nowrap;transform:translateX(-50%) translateY(8px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:520px){.header{padding:0 14px;}.tab-panel{padding:16px 12px;}.post-card{padding:16px;}}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span class="login-dot"></span><span class="login-title">BandW</span></div>
    <div class="login-sub">— پنل مدیریت —</div>
    <div class="login-card">
      <label class="login-label">رمز عبور</label>
      <input type="password" class="login-input" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
      <button class="login-btn" onclick="login()">ورود به پنل</button>
      <div class="login-error" id="login-error">رمز عبور اشتباه است.</div>
    </div>
  </div>
</div>

<div class="admin-screen" id="admin-screen">
  <header class="header">
    <a href="index.html" class="header-logo">
      <span class="header-dot"></span>
      <span class="header-name">BandW</span>
    </a>
    <span class="admin-badge">ADMIN</span>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </header>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pending')">در انتظار <span class="tab-count" id="cnt-pending"></span></button>
    <button class="tab-btn" onclick="switchTab('published')">منتشرشده <span class="tab-count" id="cnt-published"></span></button>
    <button class="tab-btn" onclick="switchTab('categories')">کتگوری‌ها</button>
  </div>
  <div class="tab-panel active" id="panel-pending"><div class="status-card loading-card">در حال بارگذاری...</div></div>
  <div class="tab-panel" id="panel-published"><div class="status-card loading-card">در حال بارگذاری...</div></div>
  <div class="tab-panel" id="panel-categories"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://hngeorydusjxqaceojmj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZ2VvcnlkdXNqeHFhY2Vvam1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NDMyMzgsImV4cCI6MjA5NjMxOTIzOH0.UnSr8T95PIrJSroAD0xlvh48DXeqX03HGQAanHh1M0c';
const PASS='bandw2024';
const H={apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'};

function login(){
  if(document.getElementById('pass').value===PASS){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    loadAll();
  }else{document.getElementById('login-error').style.display='block';}
}
function logout(){document.getElementById('login-screen').style.display='flex';document.getElementById('admin-screen').style.display='none';document.getElementById('pass').value='';}

let currentTab='pending';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['pending','published','categories'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='categories')loadCategories();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

async function api(method,table,id,data){
  const url=id?`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`:`${SUPABASE_URL}/rest/v1/${table}`;
  return fetch(url,{method,headers:{...H,Prefer:'return=minimal'},body:data?JSON.stringify(data):undefined});
}

async function loadAll(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/posts?order=created_at.desc`,{headers:H});
  const posts=await r.json();
  const pending=posts.filter(p=>p.status==='pending');
  const published=posts.filter(p=>p.status==='published');
  document.getElementById('cnt-pending').textContent=`(${pending.length})`;
  document.getElementById('cnt-published').textContent=`(${published.length})`;
  renderPosts('panel-pending',pending,'pending');
  renderPosts('panel-published',published,'published');
}

function renderPosts(elId,posts,type){
  const el=document.getElementById(elId);
  if(!posts.length){el.innerHTML='<div class="status-card">پستی یافت نشد</div>';return;}
  el.innerHTML='';
  posts.forEach((p,i)=>{
    const date=new Date(p.created_at).toLocaleDateString('fa-IR');
    const d=document.createElement('div');
    d.className='post-card';
    d.style.animationDelay=`${i*40}ms`;
    d.innerHTML=`
      <div class="post-title">${esc(p.title)}</div>
      <div class="post-meta">${esc(p.category)} · ${date}</div>
      <div class="post-preview">${esc(p.body)}</div>
      <div class="post-actions">
        ${type==='pending'?`<button class="action-btn publish" onclick="publish('${p.id}')">✓ انتشار</button>`:''}
        ${type==='published'?`<button class="action-btn ${p.is_best?'star-on':''}" onclick="toggleBest('${p.id}',${p.is_best})">${p.is_best?'★ برگزیده':'☆ برگزیده'}</button>`:''}
        ${type==='published'?`<button class="action-btn" onclick="unpublish('${p.id}')">↩ لغو</button>`:''}
        <button class="action-btn danger" onclick="del('${p.id}')">✕ حذف</button>
      </div>`;
    el.appendChild(d);
  });
}

async function publish(id){await api('PATCH','posts',id,{status:'published'});toast('منتشر شد ✓');loadAll();}
async function unpublish(id){await api('PATCH','posts',id,{status:'pending'});toast('لغو انتشار شد');loadAll();}
async function toggleBest(id,cur){await api('PATCH','posts',id,{is_best:!cur});toast(!cur?'★ به برگزیده‌ها اضافه شد':'از برگزیده‌ها حذف شد');loadAll();}
async function del(id){if(!confirm('حذف شود؟'))return;await api('DELETE','posts',id);toast('حذف شد');loadAll();}

async function loadCategories(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/categories?order=name.asc`,{headers:H});
  const cats=await r.json();
  const el=document.getElementById('panel-categories');
  el.innerHTML=`
    <div class="add-cat-card">
      <input type="text" class="cat-input" id="new-cat" placeholder="نام کتگوری جدید..." onkeydown="if(event.key==='Enter')addCat()"/>
      <button class="cat-add-btn" onclick="addCat()">+ اضافه</button>
    </div>`;
  if(!cats.length){el.innerHTML+='<div class="status-card">کتگوری‌ای یافت نشد</div>';return;}
  cats.forEach((cat,i)=>{
    const d=document.createElement('div');
    d.className='cat-row';d.style.animationDelay=`${i*30}ms`;
    d.innerHTML=`<span class="cat-row-name">${esc(cat.name)}</span><button class="action-btn danger" onclick="delCat('${cat.id}','${esc(cat.name)}')">✕</button>`;
    el.appendChild(d);
  });
}

async function addCat(){
  const name=document.getElementById('new-cat').value.trim();
  if(!name)return;
  await api('POST','categories',null,{name});
  toast('کتگوری اضافه شد');loadCategories();
  document.getElementById('new-cat').value='';
}

async function delCat(id,name){
  if(!confirm(`"${name}" حذف شود؟`))return;
  await api('DELETE','categories',id);
  toast('کتگوری حذف شد');loadCategories();
}
</script>
</body>
</html>
